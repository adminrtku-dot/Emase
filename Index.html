<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabungan Emas</title>
    
    <!-- Tailwind CSS (via CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (via CDN) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel untuk JSX (via CDN) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons (via CDN) -->
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body class="bg-[#121212]">
    
    <!-- Kontainer utama untuk aplikasi React -->
    <div id="root"></div>

    <!-- KODE REACT APLIKASI -->
    <script type="text/babel">
      const { useState, useEffect, useMemo } = React;
      const { Download, Upload, Target, Plus, X, ArrowRightLeft, Activity, Lock, Delete, Settings, History, ChevronRight } = lucide;

      // --- KONFIGURASI HARGA & PAJAK ---
      const TARIF_PPH_22 = 0.0025; // 0.25% (Asumsi NPWP terdaftar)
      const BATAS_MATERAI = 10000000;
      const BIAYA_MATERAI = 10000;
      const PIN_TRANSAKSI = '123456'; // Default PIN transaksi simulasi

      // Format Rupiah
      const formatRp = (angka) => {
        return new Intl.NumberFormat('id-ID', {
          style: 'currency',
          currency: 'IDR',
          minimumFractionDigits: 0,
          maximumFractionDigits: 0,
        }).format(angka);
      };

      // Fungsi Perhitungan Buyback Netto (Setelah PPh & Materai)
      const hitungNetBuyback = (gram, hargaBuyback) => {
        if (gram <= 0) return 0;
        const kotor = gram * hargaBuyback;
        const pph = kotor * TARIF_PPH_22;
        const materai = kotor > BATAS_MATERAI ? BIAYA_MATERAI : 0;
        return kotor - pph - materai;
      };

      // --- KOMPONEN UTAMA ---
      function App() {
        // State Utama Aplikasi
        const [prices, setPrices] = useState({ beli: 1350000, buyback: 1250000 });
        const [goals, setGoals] = useState([]);
        const [transactions, setTransactions] = useState([]);
        
        // Status Sinkronisasi/Loading Data
        const [isLoading, setIsLoading] = useState(true);
        const [isSyncing, setIsSyncing] = useState(false);

        const [activeModal, setActiveModal] = useState(null); // 'buy', 'sell', 'goal', 'settings', 'history', null
        const [formData, setFormData] = useState({ goalId: '', amountGrams: '', name: '', targetGrams: '' });
        const [priceForm, setPriceForm] = useState({ beli: prices.beli, buyback: prices.buyback });

        // State untuk Layar PIN
        const [pinModal, setPinModal] = useState({ isOpen: false, action: null });
        const [pinInput, setPinInput] = useState('');
        const [pinError, setPinError] = useState(false);

        // Render Lucide Icons setelah komponen di-mount atau dimuat ulang
        useEffect(() => {
          lucide.createIcons();
        });

        // AMBIL DATA AWAL DARI GOOGLE SHEETS
        useEffect(() => {
          google.script.run
            .withSuccessHandler((data) => {
              setPrices(data.prices);
              setGoals(data.goals);
              setTransactions(data.transactions);
              setIsLoading(false);
            })
            .withFailureHandler((err) => {
              alert("Gagal memuat data dari Spreadsheet: " + err);
              setIsLoading(false);
            })
            .getAppData();
        }, []);

        // --- KALKULASI PORTFOLIO ---
        const { totalGrams, modalInvestasi, totalNetBuyback } = useMemo(() => {
          const totalGrams = goals.reduce((acc, goal) => acc + goal.currentGrams, 0);
          const modalInvestasi = transactions.reduce((acc, trx) => {
            if (trx.type === 'buy') return acc + (trx.amountGrams * trx.pricePerGram);
            if (trx.type === 'sell') return acc - (trx.amountGrams * trx.pricePerGram);
            return acc;
          }, 0);
          const totalNetBuyback = hitungNetBuyback(totalGrams, prices.buyback);
          
          return { totalGrams, modalInvestasi, totalNetBuyback };
        }, [goals, transactions, prices]);

        const keuntunganRp = totalNetBuyback - modalInvestasi;
        const keuntunganPersen = modalInvestasi > 0 ? (keuntunganRp / modalInvestasi) * 100 : 0;
        const isProfit = keuntunganRp >= 0;

        // --- HANDLER TRANSAKSI ---
        
        // Efek untuk memvalidasi PIN otomatis saat 6 digit terisi
        useEffect(() => {
          if (pinInput.length === 6) {
            if (pinInput === PIN_TRANSAKSI) {
              // Jika PIN Benar, eksekusi transaksi
              if (pinModal.action === 'goal') {
                executeAddGoal();
              } else if (pinModal.action === 'buy' || pinModal.action === 'sell') {
                executeTransaction();
              }
              setPinModal({ isOpen: false, action: null });
              setPinInput('');
            } else {
              setPinError(true);
              setTimeout(() => {
                setPinInput('');
                setPinError(false);
              }, 1000);
            }
          }
        }, [pinInput, pinModal.action]);

        // Validasi form sebelum memunculkan modal PIN
        const handlePreSubmit = (e) => {
          e.preventDefault();
          
          if (activeModal === 'goal') {
            const { name, targetGrams } = formData;
            if (!name || isNaN(parseFloat(targetGrams))) return alert("Input tidak valid!");
          } else {
            const { goalId, amountGrams } = formData;
            const grams = parseFloat(amountGrams);
            if (!goalId || isNaN(grams) || grams <= 0) return alert("Input tidak valid!");
            
            const goalIndex = goals.findIndex(g => g.id === parseInt(goalId));
            if (goalIndex === -1) return;
            
            if (activeModal === 'sell' && goals[goalIndex].currentGrams < grams) {
              return alert("Saldo gram tidak mencukupi untuk dijual!");
            }
          }
          
          setPinModal({ isOpen: true, action: activeModal });
          setPinError(false);
          setPinInput('');
        };

        const executeTransaction = () => {
          setIsSyncing(true);
          const { goalId, amountGrams } = formData;
          const grams = parseFloat(amountGrams);

          const goalIndex = goals.findIndex(g => g.id === parseInt(goalId));
          if (goalIndex === -1) return;

          let updatedGoals = [...goals];
          let type = pinModal.action;

          if (type === 'buy') {
            updatedGoals[goalIndex].currentGrams += grams;
          } else if (type === 'sell') {
            updatedGoals[goalIndex].currentGrams -= grams;
          }

          const newTrx = {
            id: Date.now(),
            type: type,
            amountGrams: grams,
            pricePerGram: type === 'buy' ? prices.beli : prices.buyback,
            date: new Date().toISOString()
          };

          // Simpan ke Google Sheets via GAS backend
          google.script.run
            .withSuccessHandler(() => {
              setGoals(updatedGoals);
              setTransactions([...transactions, newTrx]);
              setIsSyncing(false);
              closeModal();
            })
            .withFailureHandler((err) => {
              alert("Gagal mencatat transaksi ke Spreadsheet: " + err);
              setIsSyncing(false);
            })
            .saveTransactionAndGoalsGS(newTrx, updatedGoals);
        };

        const executeAddGoal = () => {
          setIsSyncing(true);
          const { name, targetGrams } = formData;
          const colors = ['bg-indigo-500', 'bg-rose-500', 'bg-cyan-500', 'bg-violet-500'];
          const randomColor = colors[Math.floor(Math.random() * colors.length)];

          const newGoal = {
            id: Date.now(),
            name,
            targetGrams: parseFloat(targetGrams),
            currentGrams: 0,
            color: randomColor
          };

          const updatedGoals = [...goals, newGoal];

          // Simpan ke Google Sheets via GAS backend
          google.script.run
            .withSuccessHandler(() => {
              setGoals(updatedGoals);
              setIsSyncing(false);
              closeModal();
            })
            .withFailureHandler((err) => {
              alert("Gagal menyimpan tujuan baru ke Spreadsheet: " + err);
              setIsSyncing(false);
            })
            .saveGoalsGS(updatedGoals);
        };

        const handleSaveSettings = (e) => {
          e.preventDefault();
          const newBeli = parseFloat(priceForm.beli);
          const newBuyback = parseFloat(priceForm.buyback);
          
          if (isNaN(newBeli) || isNaN(newBuyback) || newBeli <= 0 || newBuyback <= 0) {
            return alert("Harga tidak valid!");
          }

          setIsSyncing(true);
          const newPrices = { beli: newBeli, buyback: newBuyback };

          // Simpan ke Google Sheets via GAS backend
          google.script.run
            .withSuccessHandler(() => {
              setPrices(newPrices);
              setIsSyncing(false);
              closeModal();
            })
            .withFailureHandler((err) => {
              alert("Gagal memperbarui harga di Spreadsheet: " + err);
              setIsSyncing(false);
            })
            .savePricesGS(newPrices);
        };

        const closeModal = () => {
          setActiveModal(null);
          setFormData({ goalId: '', amountGrams: '', name: '', targetGrams: '' });
        };

        const openSettings = () => {
          setPriceForm({ beli: prices.beli, buyback: prices.buyback });
          setActiveModal('settings');
        };

        // --- TAMPILAN LOADING AWAL ---
        if (isLoading) {
          return (
            <div className="min-h-screen bg-[#121212] flex flex-col items-center justify-center p-4">
              <div className="w-12 h-12 border-4 border-[#2ecc71] border-t-transparent rounded-full animate-spin mb-4"></div>
              <p className="text-gray-400 text-sm">Menghubungkan ke Google Sheets...</p>
            </div>
          );
        }

        // --- TAMPILAN UTAMA APLIKASI ---
        return (
          <div className="min-h-screen bg-[#121212] text-gray-100 font-sans pb-10 relative">
            
            {/* INDIKATOR PROSES SINKRONISASI */}
            {isSyncing && (
              <div className="fixed top-4 left-1/2 -translate-x-1/2 bg-[#1a2f24] border border-[#2a4535] text-[#2ecc71] py-2 px-4 rounded-full text-xs font-semibold flex items-center gap-2 shadow-lg z-50">
                <div className="w-3 h-3 border-2 border-[#2ecc71] border-t-transparent rounded-full animate-spin"></div>
                Menyimpan data...
              </div>
            )}

            {/* HEADER / PORTFOLIO CARD */}
            <div className="pt-4 px-4 max-w-md mx-auto">
              <div className="bg-[#1a2f24] p-6 rounded-3xl shadow-lg border border-[#2a4535] relative">
                <button 
                  onClick={openSettings} 
                  className="absolute top-4 right-4 p-2 text-[#2ecc71] hover:text-white hover:bg-[#2a4535] rounded-full transition"
                  title="Pengaturan Harga Emas"
                >
                  <i data-lucide="settings" className="w-5 h-5"></i>
                </button>

                <p className="text-gray-400 text-sm mb-1 mt-2">Nilai Portofolio (Net Buyback)</p>
                <h1 className="text-3xl font-bold text-white mb-6">
                  {formatRp(totalNetBuyback)}
                </h1>
                
                <div className="flex justify-between items-end mb-6">
                  <div>
                    <p className="text-gray-400 text-sm mb-1">Keuntungan</p>
                    <p className={`text-lg font-semibold ${isProfit ? 'text-[#2ecc71]' : 'text-red-500'}`}>
                      {isProfit ? '+' : ''}{formatRp(keuntunganRp)}
                    </p>
                  </div>
                  <div className="text-right">
                    <p className="text-gray-400 text-sm mb-1">Imbal Hasil</p>
                    <p className={`text-lg font-semibold flex items-center justify-end ${isProfit ? 'text-[#2ecc71]' : 'text-red-500'}`}>
                      {isProfit ? '▲' : '▼'} {Math.abs(keuntunganPersen).toFixed(2)}%
                    </p>
                  </div>
                </div>
                <div className="flex justify-between items-end">
                   <div>
                    <p className="text-gray-400 text-xs mb-1">Total Saldo Emas</p>
                    <p className="text-md font-medium text-gray-200">{totalGrams.toFixed(2)} Gram</p>
                  </div>
                   <div className="text-right">
                    <p className="text-gray-400 text-xs mb-1">Est. Harga Buyback</p>
                    <p className="text-md font-medium text-gray-200">{formatRp(prices.buyback)}/g</p>
                  </div>
                </div>
              </div>
            </div>

            {/* ACTION BUTTONS */}
            <div className="max-w-md mx-auto mt-6 px-4">
              <div className="flex gap-4 justify-between bg-[#1e1e1e] p-4 rounded-2xl border border-gray-800">
                <button 
                  onClick={() => setActiveModal('buy')}
                  className="flex-1 flex flex-col items-center gap-2 group"
                >
                  <div className="p-3 bg-[#1e3a2b] text-[#2ecc71] rounded-xl group-hover:bg-[#254736] transition">
                    <i data-lucide="download" className="w-6 h-6"></i>
                  </div>
                  <span className="text-xs font-medium text-gray-300">Beli</span>
                </button>
                
                <button 
                  onClick={() => setActiveModal('sell')}
                  className="flex-1 flex flex-col items-center gap-2 group"
                >
                  <div className="p-3 bg-[#3a1e1e] text-red-500 rounded-xl group-hover:bg-[#472525] transition">
                    <i data-lucide="upload" className="w-6 h-6"></i>
                  </div>
                  <span className="text-xs font-medium text-gray-300">Jual</span>
                </button>
                
                <button 
                  onClick={() => setActiveModal('goal')}
                  className="flex-1 flex flex-col items-center gap-2 group"
                >
                  <div className="p-3 bg-[#1e2a3a] text-blue-400 rounded-xl group-hover:bg-[#253447] transition">
                    <i data-lucide="target" className="w-6 h-6"></i>
                  </div>
                  <span className="text-xs font-medium text-gray-300">Tujuan</span>
                </button>
              </div>
            </div>

            {/* TUJUAN TABUNGAN DENGAN AKSES RIWAYAT */}
            <div className="max-w-md mx-auto mt-6 px-4">
              <div className="flex justify-between items-center mb-4">
                <h2 className="text-lg font-semibold text-white">Tujuan Tabungan</h2>
                <button onClick={() => setActiveModal('history')} className="text-xs text-[#2ecc71] flex items-center gap-1 hover:underline">
                  Riwayat <i data-lucide="chevron-right" className="w-4 h-4"></i>
                </button>
              </div>
              
              <div className="space-y-4">
                {goals.map(goal => {
                  const progress = (goal.currentGrams / goal.targetGrams) * 100;
                  const netValue = hitungNetBuyback(goal.currentGrams, prices.buyback);
                  
                  return (
                    <div key={goal.id} className="flex items-center justify-between p-4 bg-[#1e1e1e] rounded-xl border border-gray-800 hover:border-gray-700 transition">
                      <div className="flex items-center gap-4">
                        <div className={`w-10 h-10 rounded-full flex items-center justify-center text-white font-bold ${goal.color}`}>
                          {goal.name.charAt(0)}
                        </div>
                        <div>
                          <h3 className="font-semibold text-white text-sm">{goal.name}</h3>
                          <p className="text-xs text-gray-400 mt-0.5">
                            {goal.currentGrams.toFixed(2)} / {goal.targetGrams.toFixed(2)} g ({progress.toFixed(1)}%)
                          </p>
                        </div>
                      </div>
                      <div className="text-right">
                        <p className="font-semibold text-white text-sm">{formatRp(netValue)}</p>
                        <p className="text-xs text-[#2ecc71] mt-0.5">
                          +{formatRp(hitungNetBuyback(goal.currentGrams, prices.buyback) - (goal.currentGrams * prices.beli))} est
                        </p>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* MODALS */}
            {activeModal && (
              <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
                <div className="bg-[#1e1e1e] border border-gray-800 p-6 rounded-2xl w-full max-w-sm">
                  <div className="flex justify-between items-center mb-6">
                    <h2 className="text-xl font-bold text-white">
                      {activeModal === 'buy' ? 'Beli Emas' : activeModal === 'sell' ? 'Jual Emas' : activeModal === 'settings' ? 'Update Harga Emas' : activeModal === 'history' ? 'Riwayat Transaksi' : 'Tambah Tujuan Baru'}
                    </h2>
                    <button onClick={closeModal} className="text-gray-400 hover:text-white">
                      <i data-lucide="x" className="w-6 h-6"></i>
                    </button>
                  </div>

                  {activeModal === 'history' ? (
                    <div className="space-y-3 max-h-[60vh] overflow-y-auto pr-2">
                      {transactions.length === 0 ? (
                        <p className="text-gray-400 text-center py-8 text-sm">Belum ada riwayat transaksi.</p>
                      ) : (
                        transactions.slice().reverse().slice(0, 10).map(trx => (
                          <div key={trx.id} className="bg-[#121212] p-4 rounded-xl border border-gray-800 flex justify-between items-center">
                            <div>
                              <p className={`text-sm font-bold ${trx.type === 'buy' ? 'text-[#2ecc71]' : 'text-red-500'}`}>
                                {trx.type === 'buy' ? 'Beli Emas' : 'Jual Emas'}
                              </p>
                              <p className="text-xs text-gray-400 mt-1">
                                {new Date(trx.date).toLocaleString('id-ID', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' })}
                              </p>
                            </div>
                            <div className="text-right">
                              <p className="text-sm font-bold text-white">{trx.amountGrams.toFixed(2)} g</p>
                              <p className="text-xs text-gray-400 mt-1">{formatRp(trx.amountGrams * trx.pricePerGram)}</p>
                            </div>
                          </div>
                        ))
                      )}
                    </div>
                  ) : (
                    <form onSubmit={activeModal === 'settings' ? handleSaveSettings : handlePreSubmit} className="space-y-4">
                    
                    {/* Input Beli / Jual */}
                    {(activeModal === 'buy' || activeModal === 'sell') && (
                      <>
                        <div>
                          <label className="block text-sm text-gray-400 mb-2">Pilih Tujuan</label>
                          <select 
                            required
                            value={formData.goalId}
                            onChange={(e) => setFormData({...formData, goalId: e.target.value})}
                            className="w-full bg-[#121212] border border-gray-700 rounded-xl p-3 text-white focus:outline-none focus:border-[#2ecc71]"
                          >
                            <option value="">-- Pilih Tujuan --</option>
                            {goals.map(g => <option key={g.id} value={g.id}>{g.name} (Saldo: {g.currentGrams.toFixed(2)}g)</option>)}
                          </select>
                        </div>
                        <div>
                          <label className="block text-sm text-gray-400 mb-2">Jumlah Gram</label>
                          <input 
                            type="number" 
                            step="0.01"
                            required
                            value={formData.amountGrams}
                            onChange={(e) => setFormData({...formData, amountGrams: e.target.value})}
                            placeholder="Contoh: 1.5"
                            className="w-full bg-[#121212] border border-gray-700 rounded-xl p-3 text-white focus:outline-none focus:border-[#2ecc71]"
                          />
                        </div>
                        
                        {/* Rincian Estimasi Biaya */}
                        {formData.amountGrams && (
                          <div className="bg-[#121212] p-4 rounded-xl border border-gray-800 space-y-2 mt-4 text-sm">
                            {activeModal === 'buy' ? (
                              <div className="flex justify-between text-gray-300">
                                <span>Est. Harga Beli:</span>
                                <span className="font-semibold text-white">{formatRp(formData.amountGrams * prices.beli)}</span>
                              </div>
                            ) : (
                              <>
                                <div className="flex justify-between text-gray-300">
                                  <span>Harga Buyback Kotor:</span>
                                  <span>{formatRp(formData.amountGrams * prices.buyback)}</span>
                                </div>
                                <div className="flex justify-between text-red-400 text-xs">
                                  <span>PPh 22 (0.25%):</span>
                                  <span>- {formatRp(formData.amountGrams * prices.buyback * TARIF_PPH_22)}</span>
                                </div>
                                {(formData.amountGrams * prices.buyback) > BATAS_MATERAI && (
                                  <div className="flex justify-between text-red-400 text-xs">
                                    <span>Materai:</span>
                                    <span>- {formatRp(BIAYA_MATERAI)}</span>
                                  </div>
                                )}
                                <div className="border-t border-gray-700 my-2"></div>
                                <div className="flex justify-between text-white font-semibold">
                                  <span>Net Dana Diterima:</span>
                                  <span className="text-[#2ecc71]">{formatRp(hitungNetBuyback(formData.amountGrams, prices.buyback))}</span>
                                </div>
                              </>
                            )}
                          </div>
                        )}
                      </>
                    )}

                    {/* Input Tujuan Baru */}
                    {activeModal === 'goal' && (
                      <>
                        <div>
                          <label className="block text-sm text-gray-400 mb-2">Nama Tujuan</label>
                          <input 
                            type="text" 
                            required
                            value={formData.name}
                            onChange={(e) => setFormData({...formData, name: e.target.value})}
                            placeholder="Contoh: Tabungan Umroh, DP Mobil"
                            className="w-full bg-[#121212] border border-gray-700 rounded-xl p-3 text-white focus:outline-none focus:border-[#2ecc71]"
                          />
                        </div>
                        <div>
                          <label className="block text-sm text-gray-400 mb-2">Target Gram</label>
                          <input 
                            type="number" 
                            step="0.1"
                            required
                            value={formData.targetGrams}
                            onChange={(e) => setFormData({...formData, targetGrams: e.target.value})}
                            placeholder="Contoh: 100"
                            className="w-full bg-[#121212] border border-gray-700 rounded-xl p-3 text-white focus:outline-none focus:border-[#2ecc71]"
                          />
                        </div>
                      </>
                    )}

                    {/* Update Harga */}
                    {activeModal === 'settings' && (
                      <>
                        <div>
                          <label className="block text-sm text-gray-400 mb-2">Harga Beli Antam (/gram)</label>
                          <input 
                            type="number" 
                            required
                            value={priceForm.beli}
                            onChange={(e) => setPriceForm({...priceForm, beli: e.target.value})}
                            className="w-full bg-[#121212] border border-gray-700 rounded-xl p-3 text-white focus:outline-none focus:border-[#2ecc71]"
                          />
                        </div>
                        <div>
                          <label className="block text-sm text-gray-400 mb-2">Harga Buyback Antam (/gram)</label>
                          <input 
                            type="number" 
                            required
                            value={priceForm.buyback}
                            onChange={(e) => setPriceForm({...priceForm, buyback: e.target.value})}
                            className="w-full bg-[#121212] border border-gray-700 rounded-xl p-3 text-white focus:outline-none focus:border-[#2ecc71]"
                          />
                        </div>
                      </>
                    )}

                    <button 
                      type="submit" 
                      disabled={isSyncing}
                      className="w-full bg-[#2ecc71] hover:bg-[#27ae60] disabled:bg-gray-700 disabled:text-gray-400 text-[#121212] font-bold py-3 rounded-xl mt-6 transition"
                    >
                      {activeModal === 'buy' ? 'Beli Sekarang' : activeModal === 'sell' ? 'Jual Sekarang' : activeModal === 'settings' ? 'Simpan Harga' : 'Simpan Tujuan'}
                    </button>
                  </form>
                  )}
                </div>
              </div>
            )}

            {/* LAYAR PIN TRANSAKSI (NUMPAD) */}
            {pinModal.isOpen && (
              <div className="fixed inset-0 bg-[#121212] flex items-center justify-center p-4 z-[60]">
                <div className="w-full max-w-sm flex flex-col items-center">
                  <div className="bg-[#1a2f24] p-4 rounded-full text-[#2ecc71] mb-6">
                    <i data-lucide="lock" className="w-8 h-8"></i>
                  </div>
                  <h2 className="text-xl font-bold text-white mb-2">Masukkan PIN</h2>
                  <p className="text-gray-400 text-sm mb-8">Konfirmasi dengan 6 digit PIN (Gunakan: 123456)</p>
                  
                  {/* Indikator Titik PIN */}
                  <div className="flex gap-4 mb-12">
                    {[...Array(6)].map((_, i) => (
                      <div 
                        key={i} 
                        className={`w-4 h-4 rounded-full transition-colors duration-300 ${i < pinInput.length ? 'bg-[#2ecc71]' : 'bg-gray-700'} ${pinError ? 'bg-red-500' : ''}`}
                      />
                    ))}
                  </div>

                  {/* Tombol Numpad */}
                  <div className="grid grid-cols-3 gap-x-12 gap-y-6 w-full px-6">
                    {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(num => (
                      <button 
                        key={num} 
                        type="button"
                        onClick={() => setPinInput(prev => prev.length < 6 ? prev + num : prev)}
                        className="text-3xl font-medium text-white h-16 flex items-center justify-center hover:bg-gray-800 rounded-full transition active:scale-95"
                      >
                        {num}
                      </button>
                    ))}
                    <div className="h-16"></div>
                    <button 
                      type="button"
                      onClick={() => setPinInput(prev => prev.length < 6 ? prev + 0 : prev)}
                      className="text-3xl font-medium text-white h-16 flex items-center justify-center hover:bg-gray-800 rounded-full transition active:scale-95"
                    >
                      0
                    </button>
                    <button 
                      type="button"
                      onClick={() => setPinInput(prev => prev.slice(0, -1))}
                      className="text-gray-400 h-16 flex items-center justify-center hover:bg-gray-800 hover:text-white rounded-full transition active:scale-95"
                    >
                      <i data-lucide="delete" className="w-7 h-7"></i>
                    </button>
                  </div>

                  <button 
                    onClick={() => { setPinModal({ isOpen: false, action: null }); setPinInput(''); }}
                    className="mt-12 text-gray-500 hover:text-gray-300 transition text-sm font-medium"
                  >
                    Batalkan Transaksi
                  </button>
                </div>
              </div>
            )}
          </div>
        );
      }

      // --- RENDER APLIKASI ---
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
